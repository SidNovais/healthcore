<div class="centered-page centered-page--{{ fill() }}">
  <hc-card class="error-card" [attr.data-testid]="testId()">
    @if (icon(); as name) {
      <div class="error-icon" aria-hidden="true">
        <hc-icon [name]="name" [size]="32" />
      </div>
    }

    <h1 class="error-code error-code--{{ tone() }}">{{ code() }}</h1>
    <p class="error-title">{{ heading() }}</p>
    <p class="error-message">{{ message() }}</p>

    <a hc-button variant="ghost" routerLink="/">Go to home</a>
  </hc-card>
</div>
