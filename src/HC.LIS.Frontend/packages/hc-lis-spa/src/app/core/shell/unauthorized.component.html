<div class="centered-page">
  <hc-card class="error-card" data-testid="error-card">
    <div class="error-icon" aria-hidden="true">
      <hc-icon name="lock" [size]="32" />
    </div>
    <h1 class="error-code">403</h1>
    <p class="error-title">Access Denied</p>
    <p class="error-message">You don't have permission to view this page.</p>
    <a hc-button variant="ghost" routerLink="/">Go to home</a>
  </hc-card>
</div>
