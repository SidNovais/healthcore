<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark" aria-hidden="true">
        <hc-icon name="grid" [size]="20" />
      </div>
      <span class="logo-text">HC·LIS</span>
      <app-live-indicator />
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
      @for (item of navItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          ariaCurrentWhenActive="page"
          class="nav-item"
          [attr.aria-label]="item.label"
          [attr.data-testid]="item.testId"
        >
          <hc-icon class="nav-icon" [name]="item.icon" [size]="18" />
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      @if (user(); as u) {
        <hc-dropdown-menu class="user-menu" testId="user-menu" ariaLabel="User menu">
          <button
            hc-dropdown-trigger
            class="user-menu-trigger"
            data-testid="user-menu-trigger"
            [attr.aria-label]="'User menu for ' + u.userName"
          >
            <hc-avatar [name]="u.userName" [size]="28" testId="user-menu-avatar" />
            <span class="user-name">{{ u.userName }}</span>
            <hc-icon class="user-menu-caret" name="chevron-down" [size]="14" />
          </button>

          <!-- Identity block: the shadcn `DropdownMenuLabel` slot — inert, so it stays
               out of the menu's owned-children contract. -->
          <div class="user-menu-header" role="presentation">
            <span class="user-menu-name" data-testid="user-menu-name">{{ u.userName }}</span>
            <hc-badge [role]="u.role" class="role-badge" data-testid="shell-role-badge">
              {{ u.role }}
            </hc-badge>
          </div>

          <button
            hc-dropdown-item
            data-testid="theme-toggle-btn"
            [attr.aria-label]="themeLabel()"
            (select)="themeService.toggle()"
          >
            <hc-icon [name]="themeService.theme() === 'dark' ? 'sun' : 'moon'" [size]="16" />
            <span>{{ themeLabel() }}</span>
          </button>

          <button
            hc-dropdown-item
            class="logout-item"
            data-testid="logout-btn"
            (select)="logout()"
          >
            <hc-icon name="log-out" [size]="16" />
            <span>Sign out</span>
          </button>
        </hc-dropdown-menu>
      }
    </div>
  </aside>

  <main class="shell-main">
    <div #outletWrapper class="outlet-wrapper" data-testid="outlet-wrapper">
      <router-outlet />
    </div>
  </main>
</div>

<hc-command
  [(open)]="paletteOpen"
  [(query)]="paletteQuery"
  [items]="paletteCommands()"
  testId="command-palette"
  placeholder="Search pages and patients…"
  ariaLabel="Command palette"
  (select)="onPaletteSelect($event)"
/>
