<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark" aria-hidden="true">
        <hc-icon name="grid" [size]="20" />
      </div>
      <span class="logo-text">HC·LIS</span>
    </div>

    @if (user(); as u) {
      <hc-badge [role]="u.role" class="role-badge" data-testid="shell-role-badge">{{ u.role }}</hc-badge>
    }

    <nav class="sidebar-nav" aria-label="Main navigation">
      @for (item of navItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          ariaCurrentWhenActive="page"
          class="nav-item"
          [attr.aria-label]="item.label"
          [attr.data-testid]="item.testId"
        >
          <hc-icon class="nav-icon" [name]="item.icon" [size]="18" />
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      @if (user(); as u) {
        <span class="user-name" [title]="u.userName">{{ u.userName }}</span>
      }
      <button
        hc-button
        variant="ghost"
        size="icon"
        (click)="themeService.toggle()"
        [hcTooltip]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        data-testid="theme-toggle-btn"
      >
        <hc-icon [name]="themeService.theme() === 'dark' ? 'sun' : 'moon'" [size]="18" />
      </button>
      <button
        hc-button
        variant="ghost"
        size="icon"
        class="logout-btn"
        (click)="logout()"
        hcTooltip="Sign out"
        aria-label="Sign out"
      >
        <hc-icon name="log-out" [size]="18" />
      </button>
    </div>
  </aside>

  <main class="shell-main">
    <div #outletWrapper class="outlet-wrapper">
      <router-outlet />
    </div>
  </main>
</div>
