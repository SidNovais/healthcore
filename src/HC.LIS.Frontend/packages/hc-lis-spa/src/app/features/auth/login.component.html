<div class="login-page">
  <hc-card class="login-card" data-testid="login-card">
    <header class="login-header">
      <div class="logo-mark" aria-hidden="true">
        <hc-icon name="grid" [size]="28" />
      </div>
      <h1 class="product-name">HC·LIS</h1>
      <p class="product-tagline">Laboratory Information System</p>
    </header>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <hc-field [error]="emailError()">
        <label hc-label for="email">Email Address</label>
        <input
          hc-input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="you@hospital.org"
          aria-required="true"
          [attr.aria-invalid]="emailError() ? 'true' : null"
        />
      </hc-field>

      <hc-field [error]="passwordError()">
        <label hc-label for="password">Password</label>
        <input
          hc-input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          aria-required="true"
          [attr.aria-invalid]="passwordError() ? 'true' : null"
        />
      </hc-field>

      @if (errorMessage(); as message) {
        <hc-alert variant="error">{{ message }}</hc-alert>
      }

      <button
        hc-button
        variant="cta"
        type="submit"
        class="submit-btn"
        [loading]="isLoading()"
        [disabled]="form.invalid || isLoading()"
      >
        {{ isLoading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>
  </hc-card>

  <footer class="login-footer">
    This system is for authorized personnel only. Unauthorized access is prohibited.
  </footer>
</div>
