<div class="login-page">
  <main class="login-card">
    <header class="login-header">
      <div class="logo-mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
        </svg>
      </div>
      <h1 class="product-name">HC·LIS</h1>
      <p class="product-tagline">Laboratory Information System</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field-group">
        <label for="email" class="field-label">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="field-input"
          autocomplete="username"
          placeholder="you@hospital.org"
          [class.field-input--invalid]="form.controls.email.invalid && form.controls.email.touched"
          aria-required="true"
        />
      </div>

      <div class="field-group">
        <label for="password" class="field-label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="field-input"
          autocomplete="current-password"
          placeholder="••••••••"
          [class.field-input--invalid]="form.controls.password.invalid && form.controls.password.touched"
          aria-required="true"
        />
      </div>

      @if (errorMessage()) {
        <div class="error-alert" role="alert" aria-live="assertive">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="submit-btn"
        [disabled]="form.invalid || isLoading()"
        [class.submit-btn--loading]="isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner" aria-hidden="true"></span>
        }
        {{ isLoading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>
  </main>

  <footer class="login-footer">
    This system is for authorized personnel only. Unauthorized access is prohibited.
  </footer>
</div>
