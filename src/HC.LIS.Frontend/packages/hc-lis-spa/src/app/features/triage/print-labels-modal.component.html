<hc-dialog [open]="dialogOpen()" (openChange)="onDialogOpenChange($event)">
  <div data-testid="print-labels-modal" class="modal-content">
    <div class="modal-header">
      <div>
        <h2 class="modal-title">Print Labels</h2>
        <p class="modal-sub" data-testid="print-modal-patient-name">{{ patientName() ?? 'Unknown patient' }}</p>
      </div>
    </div>

    @if (loading()) {
      <hc-skeleton class="loading-skeleton" />
    } @else {
      <app-print-labels-card [samples]="samples()" [showPrintButton]="false" />
    }

    <div class="modal-footer">
      <button hc-button variant="ghost" size="sm" data-testid="print-modal-cancel-btn" (click)="close()">Cancel</button>
      @if (!loading() && samples().length > 0) {
        <button hc-button size="sm" data-testid="print-modal-print-btn" (click)="printLabels()">
          <hc-icon name="printer" [size]="15" /> Print
        </button>
      }
    </div>
  </div>
</hc-dialog>
