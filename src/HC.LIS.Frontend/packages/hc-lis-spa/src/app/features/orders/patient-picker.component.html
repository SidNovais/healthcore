@if (selectedPatient(); as patient) {
  <div class="selected-card" data-testid="patient-picker-selected-card">
    <div class="card-info">
      <span class="patient-name">{{ patient.fullName }}</span>
      <span class="patient-meta">
        {{ patient.dateOfBirth }}
        @if (patient.documentId) {
          · {{ patient.documentId }}
        }
      </span>
    </div>
    <button
      type="button"
      class="clear-btn"
      data-testid="patient-picker-clear-btn"
      (click)="clearSelection()"
    >✕</button>
  </div>
} @else {
  <hc-combobox
    [options]="options()"
    placeholder="Search by name or document ID..."
    inputTestId="patient-picker-input"
    listboxTestId="patient-picker-results"
    optionTestId="patient-picker-result-item"
    (queryChange)="onSearchInput($event)"
    (selected)="onOptionSelected($event)"
  />
}
