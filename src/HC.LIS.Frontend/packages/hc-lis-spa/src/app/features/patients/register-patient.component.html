<hc-page
  title="Register New Patient"
  width="wide"
  testId="register-patient"
  titleTestId="register-patient-heading"
>
  @if (error(); as message) {
    <hc-alert variant="error" data-testid="register-patient-error">{{ message }}</hc-alert>
  }

  <app-patient-form (formSubmit)="onFormSubmit($event)" />
</hc-page>
