<form [formGroup]="form" (ngSubmit)="submit()" class="patient-form">
  <fieldset class="patient-form__section" data-testid="patient-form-demographics-section">
    <legend class="patient-form__legend">Demographics</legend>

    <hc-field class="patient-form__field--full" [error]="fullNameError()">
      <label hc-label for="patient-full-name">Full Name <span class="required">*</span></label>
      <input
        hc-input
        id="patient-full-name"
        data-testid="patient-full-name-input"
        type="text"
        formControlName="fullName"
        autocomplete="off"
        [attr.aria-invalid]="fullNameError() ? 'true' : null"
      />
    </hc-field>

    <hc-field [error]="dateOfBirthError()">
      <label hc-label for="patient-dob">Date of Birth <span class="required">*</span></label>
      <hc-date-picker
        testId="patient-dob"
        inputTestId="patient-dob-input"
        inputId="patient-dob"
        ariaLabel="Choose date of birth"
        [max]="today"
        [invalid]="!!dateOfBirthError()"
        formControlName="dateOfBirth"
      />
    </hc-field>

    <hc-field>
      <label hc-label for="patient-gender">Gender</label>
      <select hc-select id="patient-gender" data-testid="patient-gender-select" formControlName="gender">
        <option value="">— optional —</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </hc-field>

    <hc-field>
      <label hc-label for="patient-mothers-name">Mother's Full Name</label>
      <input
        hc-input
        id="patient-mothers-name"
        data-testid="patient-mothers-name-input"
        type="text"
        formControlName="mothersFullName"
        autocomplete="off"
      />
    </hc-field>

    <hc-field>
      <label hc-label for="patient-document-id">Document ID</label>
      <input
        hc-input
        id="patient-document-id"
        data-testid="patient-document-id-input"
        type="text"
        formControlName="documentId"
        autocomplete="off"
      />
    </hc-field>
  </fieldset>

  <hc-separator data-testid="patient-form-section-separator" />

  <fieldset class="patient-form__section" data-testid="patient-form-contact-section">
    <legend class="patient-form__legend">Contact</legend>

    <hc-field>
      <label hc-label for="patient-phone">Phone</label>
      <input
        hc-input
        id="patient-phone"
        data-testid="patient-phone-input"
        type="tel"
        formControlName="phone"
        autocomplete="off"
      />
    </hc-field>

    <hc-field>
      <label hc-label for="patient-email">Email</label>
      <input
        hc-input
        id="patient-email"
        data-testid="patient-email-input"
        type="email"
        formControlName="email"
        autocomplete="off"
      />
    </hc-field>
  </fieldset>

  <button
    hc-button
    variant="cta"
    type="submit"
    data-testid="patient-form-submit-btn"
    class="patient-form__submit"
    [loading]="pending()"
    [disabled]="form.invalid || pending()"
  >
    Save
  </button>
</form>
