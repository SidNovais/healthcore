version: "3.8"

services:
  postgres-healthcore:
    image: postgres:latest
    container_name: postgres-healthcore
    environment:
      POSTGRES_DB: Healthcore.Dev
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"

  tcpmessage-healthcore:
    build:
      context: .
      dockerfile: Dockerfile.tcpmessage
    container_name: tcpmessage-healthcore
    depends_on:
      - postgres-healthcore
      - otel-collector
    ports:
      - "8890:8890"
    environment:
      ASPNETCORE_HCLIS_DATABASE_CONNECTION_STRING: "Host=postgres-healthcore;Port=5432;Database=Healthcore.Dev;Username=dev;Password=dev"
      ASPNETCORE_HCLIS_Tcp__UseTls: "false"
      ASPNETCORE_HCLIS_Tcp__Port: "8890"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-healthcore
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-healthcore
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-healthcore
    depends_on:
      - otel-collector
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-healthcore
    depends_on:
      - prometheus
      - jaeger
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
